name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run release:check

      - name: Validate tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_NAME}" != "v${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${package_version}."
            exit 1
          fi

      - name: Check package publish state
        id: state
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          echo "package_name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "already_published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to npm
        if: ${{ steps.state.outputs.already_published != 'true' }}
        run: npm publish --provenance

      - name: Skip npm publish for existing version
        if: ${{ steps.state.outputs.already_published == 'true' }}
        run: echo "Version ${{ steps.state.outputs.package_version }} is already on npm. Skipping npm publish."

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes --latest
          fi
