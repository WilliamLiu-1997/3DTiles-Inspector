changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - docs
    - title: Maintenance
      labels:
        - chore
        - ci
        - refactor
change-template: "- $TITLE (#$NUMBER) by @$AUTHOR"
template: |
  ## What's Changed

  $CHANGES
